name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install panda-gym
        run: |
          python -m pip install --upgrade pip
          pip install -e panda-gym/

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 panda-gym/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 panda-gym/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          pip install pytest
          cd panda-gym && pytest test/ -v --tb=short || true
